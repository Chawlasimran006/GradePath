<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – GradePath</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- Shared styles + auth form styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-page">

  <!-- ==================== Sign Up Card ==================== -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo / Brand -->
      <div class="auth-logo">
        <span class="logo-icon">📊</span>
        <span class="logo-text">GradePath</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-title">Create Your Account</h1>
      <p class="auth-subtitle">Join GradePath and start planning your grades.</p>

      <!-- Sign Up Form -->
      <form id="signup-form" class="auth-form" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="e.g. Simran Chawla" required />
          <span class="error-msg" id="signup-name-error"></span>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="e.g. student@college.edu" required />
          <span class="error-msg" id="signup-email-error"></span>
        </div>

        <!-- Roll Number -->
        <div class="form-group">
          <label for="signup-roll">Roll Number (Student ID)</label>
          <input type="text" id="signup-roll" placeholder="e.g. 21CSE001" required />
          <span class="error-msg" id="signup-roll-error"></span>
        </div>

        <!-- Password with show/hide toggle -->
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="signup-password" placeholder="At least 8 characters" required minlength="8" />
            <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
          <span class="error-msg" id="signup-password-error"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="signup-confirm" placeholder="Re-enter your password" required />
            <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
          <span class="error-msg" id="signup-confirm-error"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-cta btn-full">Create Account</button>
      </form>

      <!-- Link to Login -->
      <p class="auth-switch">
        Already have an account? <a href="login.html">Sign In</a>
      </p>

      <!-- Footer -->
      <p class="auth-footer">&copy; 2026 GradePath. Built with ❤️ for students.</p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>

</html>
