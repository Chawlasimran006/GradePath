<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – GradePath</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- Shared styles + auth form styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-page">

  <!-- ==================== Login Card ==================== -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo / Brand -->
      <div class="auth-logo">
        <span class="logo-icon">📊</span>
        <span class="logo-text">GradePath</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-title">Welcome Back!</h1>
      <p class="auth-subtitle">Sign in to continue to GradePath.</p>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" novalidate>

        <!-- Email or Roll Number -->
        <div class="form-group">
          <label for="login-email">Email or Roll Number</label>
          <input type="text" id="login-email" placeholder="e.g. student@college.edu or 21CSE001" required />
          <span class="error-msg" id="login-email-error"></span>
        </div>

        <!-- Password with show/hide toggle -->
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="Enter your password" required />
            <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
          <span class="error-msg" id="login-password-error"></span>
        </div>

        <!-- Remember me -->
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">🔒 Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-cta btn-full">Sign In</button>
      </form>

      <!-- Link to Sign Up -->
      <p class="auth-switch">
        New to GradePath? <a href="signup.html">Create an account</a>
      </p>

      <!-- Footer -->
      <p class="auth-footer">&copy; 2026 GradePath. Built with ❤️ for students.</p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>

</html>
